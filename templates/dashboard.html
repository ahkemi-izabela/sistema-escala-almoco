<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">Sistema de Escala de Almoço</span>

        <a href="/logout" class="btn btn-light btn-sm">
            Sair
        </a>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4">Dashboard</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="card shadow border-0 bg-primary text-white">
                <div class="card-body">
                    <h5>Total de Funcionários</h5>
                    <h1>{{ total_funcionarios }}</h1>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0 bg-success text-white">
                <div class="card-body">
                    <h5>Horários Cadastrados</h5>
                    <h1>{{ total_horarios }}</h1>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0 bg-warning text-dark">
                <div class="card-body">
                    <h5>Escalas Criadas</h5>
                    <h1>{{ total_escalas }}</h1>
                </div>
            </div>
        </div>

    </div>

    <div class="card shadow mt-5">
        <div class="card-body">
            <h4 class="mb-4">Menu do Sistema</h4>

            <a href="/funcionarios" class="btn btn-primary">Funcionários</a>
            <a href="/horarios" class="btn btn-success">Horários</a>
            <a href="/escala" class="btn btn-warning">Escala de Almoço</a>
        </div>
    </div>

    <div class="card shadow mt-5 mb-5">
        <div class="card-body">
            <h4 class="mb-4">Estatísticas do Sistema</h4>
            <canvas id="graficoSistema"></canvas>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('graficoSistema');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Funcionários', 'Horários', 'Escalas'],
        datasets: [{
            label: 'Quantidade',
            data: [
                {{ total_funcionarios }},
                {{ total_horarios }},
                {{ total_escalas }}
            ],
            borderWidth: 1
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Funcionário</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">Editar Funcionário</span>
        <a href="/funcionarios" class="btn btn-light btn-sm">Voltar</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="card shadow p-4">
        <h3>Editar Funcionário</h3>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nome</label>
                <input type="text" name="nome" class="form-control" value="{{ funcionario.nome }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" name="email" class="form-control" value="{{ funcionario.email }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Setor</label>
                <input type="text" name="setor" class="form-control" value="{{ funcionario.setor }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Cargo</label>
                <input type="text" name="cargo" class="form-control" value="{{ funcionario.cargo }}">
            </div>

            <button type="submit" class="btn btn-success">Salvar Alterações</button>
        </form>
    </div>
</div>

</body>
</html>

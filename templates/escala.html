<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Escala de Almoço</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">Escala de Almoço</span>
        <a href="/dashboard" class="btn btn-light btn-sm">Voltar</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="card shadow p-4">
        <h3>Cadastrar Escala</h3>
        <p class="text-muted">Selecione o funcionário, horário e data do almoço.</p>

        <form method="POST" class="row g-3 mb-4">
            <div class="col-md-4">
                <label class="form-label">Funcionário</label>
                <select name="funcionario_id" class="form-control" required>
                    <option value="">Selecione</option>
                    {% for funcionario in funcionarios %}
                    <option value="{{ funcionario.id }}">{{ funcionario.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Horário</label>
                <select name="horario_id" class="form-control" required>
                    <option value="">Selecione</option>
                    {% for horario in horarios %}
                    <option value="{{ horario.id }}">
                        {{ horario.horario_inicio }} às {{ horario.horario_fim }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Data</label>
                <input type="date" name="data" class="form-control" required>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-success">Cadastrar Escala</button>
            </div>
        </form>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Funcionário</th>
                    <th>Horário Início</th>
                    <th>Horário Fim</th>
                    <th>Data</th>
                </tr>
            </thead>

            <tbody>
                {% for escala in escalas %}
                <tr>
                    <td>{{ escala.id }}</td>
                    <td>{{ escala.nome }}</td>
                    <td>{{ escala.horario_inicio }}</td>
                    <td>{{ escala.horario_fim }}</td>
                    <td>{{ escala.data }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>

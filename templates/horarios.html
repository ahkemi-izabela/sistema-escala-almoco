<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Horários de Almoço</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">Horários de Almoço</span>
        <a href="/dashboard" class="btn btn-light btn-sm">Voltar</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="card shadow p-4">
        <h3>Cadastro de Horários</h3>
        <p class="text-muted">Cadastre os horários disponíveis para almoço.</p>

        <form method="POST" class="row g-3 mb-4">
            <div class="col-md-4">
                <label class="form-label">Horário Início</label>
                <input type="time" name="horario_inicio" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Horário Fim</label>
                <input type="time" name="horario_fim" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Limite de Funcionários</label>
                <input type="number" name="limite" class="form-control" required>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-success">Cadastrar Horário</button>
            </div>
        </form>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Início</th>
                    <th>Fim</th>
                    <th>Limite</th>
                </tr>
            </thead>

            <tbody>
                {% for horario in horarios %}
                <tr>
                    <td>{{ horario.id }}</td>
                    <td>{{ horario.horario_inicio }}</td>
                    <td>{{ horario.horario_fim }}</td>
                    <td>{{ horario.limite_funcionarios }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Funcionários</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">Funcionários</span>

        <a href="/dashboard" class="btn btn-light btn-sm">
            Voltar
        </a>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow p-4">

        <h3>Lista de Funcionários</h3>

        <p class="text-muted">
            Funcionários cadastrados no sistema.
        </p>

        <form method="POST" class="row g-3 mb-4">

            <div class="col-md-3">
                <input
                    type="text"
                    name="nome"
                    class="form-control"
                    placeholder="Nome"
                    required
                >
            </div>

            <div class="col-md-3">
                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="E-mail"
                    required
                >
            </div>

            <div class="col-md-3">
                <input
                    type="text"
                    name="setor"
                    class="form-control"
                    placeholder="Setor"
                >
            </div>

            <div class="col-md-3">
                <input
                    type="text"
                    name="cargo"
                    class="form-control"
                    placeholder="Cargo"
                >
            </div>

            <div class="col-12">
                <button
                    type="submit"
                    class="btn btn-success"
                >
                    Cadastrar Funcionário
                </button>
            </div>

        </form>

        <table class="table table-striped mt-3">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Setor</th>
                    <th>Cargo</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody>

                {% for funcionario in funcionarios %}

                <tr>

                    <td>{{ funcionario.id }}</td>

                    <td>{{ funcionario.nome }}</td>

                    <td>{{ funcionario.email }}</td>

                    <td>{{ funcionario.setor }}</td>

                    <td>{{ funcionario.cargo }}</td>

                    <td>

                        <a
                            href="/editar_funcionario/{{ funcionario.id }}"
                            class="btn btn-warning btn-sm"
                        >
                            Editar
                        </a>

                        <a
                            href="/excluir_funcionario/{{ funcionario.id }}"
                            class="btn btn-danger btn-sm"
                        >
                            Excluir
                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>

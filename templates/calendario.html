<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calendário da Escala</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">Calendário da Escala</span>
        <a href="/dashboard" class="btn btn-light btn-sm">Voltar</a>
    </div>
</nav>

<div class="container mt-4">

    <h3 class="mb-4">Calendário Visual da Escala</h3>

    {% for escala in escalas %}

    <div class="card shadow mb-3">
        <div class="card-body">
            <h5>{{ escala.data.strftime('%d/%m/%Y') }}</h5>

            <p class="mb-1">
                <strong>Funcionário:</strong> {{ escala.nome }}
            </p>

            <p class="mb-1">
                <strong>Setor:</strong> {{ escala.setor }}
            </p>

            <p class="mb-0">
                <strong>Horário:</strong>
                {{ escala.horario_inicio }} às {{ escala.horario_fim }}
            </p>
        </div>
    </div>

    {% endfor %}

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel do Funcionário</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success">
    <div class="container-fluid">
        <span class="navbar-brand">
            Área do Funcionário
        </span>

        <a href="/logout" class="btn btn-light btn-sm">
            Sair
        </a>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow p-4 mb-4">

        <h2>Bem-vindo!</h2>

        <p class="text-muted">
            Utilize os atalhos abaixo para consultar suas informações.
        </p>

    </div>

    <div class="row">

        <div class="col-md-4 mb-3">

            <div class="card shadow h-100">

                <div class="card-body">

                    <h4>Minha Escala</h4>

                    <p>
                        Consulte seus horários de almoço.
                    </p>

                    <a
                        href="/minha_escala"
                        class="btn btn-primary"
                    >
                        Acessar
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4 mb-3">

            <div class="card shadow h-100">

                <div class="card-body">

                    <h4>Calendário</h4>

                    <p>
                        Visualize o calendário das escalas.
                    </p>

                    <a
                        href="/calendario"
                        class="btn btn-success"
                    >
                        Acessar
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4 mb-3">

            <div class="card shadow h-100">

                <div class="card-body">

                    <h4>Relatórios</h4>

                    <p>
                        Consulte os relatórios disponíveis.
                    </p>

                    <a
                        href="/relatorio_escala"
                        class="btn btn-secondary"
                    >
                        Acessar
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
